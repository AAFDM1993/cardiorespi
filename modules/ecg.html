<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador ECG — FisioResp</title>
<link rel="stylesheet" href="../assets/css/fisioresp.css">
<style>
/* ── layout ── */
.mode-section{display:none}
.mode-section.active{display:block}

/* ── canvas wrap ── */
.ecg-wrap{
  background:#0a1628;
  border-radius:12px;
  border:1px solid var(--border);
  padding:1rem;
  position:relative;
  overflow:hidden;
}
.ecg-wrap canvas{
  display:block;
  width:100%;
  border-radius:6px;
  image-rendering:crisp-edges;
}
.ecg-label{
  position:absolute;
  top:.75rem;left:1rem;
  font-family:var(--fh);
  font-size:.7rem;
  color:#4a9eff88;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.ecg-hr-badge{
  position:absolute;
  top:.75rem;right:1rem;
  font-family:var(--fh);
  font-size:1.1rem;
  color:#4a9eff;
  background:#0a1628cc;
  padding:.1rem .5rem;
  border-radius:6px;
}

/* ── rhythm grid ── */
.rhythm-cat{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text3);
  margin:1rem 0 .4rem;
  font-family:var(--fh);
}
.rhythm-grid{
  display:flex;flex-wrap:wrap;gap:.4rem;
  margin-bottom:.25rem;
}
.r-btn{
  padding:.35rem .8rem;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text2);
  font-size:.8rem;
  cursor:pointer;
  transition:all .18s;
  font-family:var(--fh);
}
.r-btn:hover{border-color:var(--blue);color:var(--blue)}
.r-btn.active{
  background:var(--blue);
  border-color:var(--blue);
  color:#fff;
  box-shadow:0 0 10px #2196f340;
}

/* ── hr slider ── */
.hr-row{
  display:flex;align-items:center;gap:.75rem;
  margin-top:.75rem;
}
.hr-row label{font-size:.8rem;color:var(--text3);white-space:nowrap;min-width:4rem}
.hr-row input[type=range]{flex:1;accent-color:var(--blue)}
.hr-val{font-family:var(--fh);font-size:.85rem;color:var(--blue);min-width:4rem;text-align:right}

/* ── info panel (aprendizaje) ── */
.info-panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.25rem 1.5rem;
  margin-top:1rem;
}
.info-panel h3{
  font-family:var(--fh);
  font-size:1rem;
  color:var(--text1);
  margin:0 0 .75rem;
  display:flex;align-items:center;gap:.5rem;
}
.info-rows{display:flex;flex-direction:column;gap:.35rem}
.info-row{display:flex;gap:.5rem;font-size:.82rem}
.info-key{color:var(--text3);min-width:7rem;flex-shrink:0}
.info-val{color:var(--text1)}
.significance-box{
  margin-top:.75rem;
  padding:.6rem .85rem;
  border-radius:8px;
  background:#1e293b;
  font-size:.82rem;
  color:var(--text2);
  border-left:3px solid var(--amber);
}
.mgmt-box{
  margin-top:.5rem;
  padding:.6rem .85rem;
  border-radius:8px;
  background:#1e293b;
  font-size:.82rem;
  color:var(--text2);
  border-left:3px solid var(--blue);
}

/* ── evaluacion ── */
.eval-progress{
  display:flex;align-items:center;gap:.75rem;
  margin-bottom:1rem;
}
.eval-progress .prog-bar{
  flex:1;height:6px;
  background:var(--border);
  border-radius:3px;
  overflow:hidden;
}
.eval-progress .prog-fill{
  height:100%;
  background:var(--blue);
  border-radius:3px;
  transition:width .3s;
}
.eval-q-num{font-size:.8rem;color:var(--text3);font-family:var(--fh);white-space:nowrap}
.eval-prompt{
  font-family:var(--fh);
  font-size:1rem;
  color:var(--text1);
  margin:0 0 .85rem;
}
.eval-choices{display:flex;flex-direction:column;gap:.45rem}
.eval-choice{
  padding:.65rem 1rem;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text2);
  cursor:pointer;
  font-size:.85rem;
  transition:all .18s;
  text-align:left;
}
.eval-choice:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.eval-choice.correct{background:#16a34a1a;border-color:var(--green);color:var(--green)}
.eval-choice.wrong{background:#ef44441a;border-color:var(--red);color:var(--red)}
.eval-choice:disabled{cursor:default}
.eval-fb{
  margin-top:.65rem;
  padding:.55rem .85rem;
  border-radius:8px;
  font-size:.82rem;
}
.eval-fb.ok{background:#16a34a18;color:var(--green);border:1px solid var(--green)}
.eval-fb.err{background:#ef444418;color:var(--red);border:1px solid var(--red)}
.eval-next-btn{margin-top:.75rem}

/* ── result card ── */
.result-big{
  text-align:center;
  padding:2rem;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
}
.result-big .nota-num{
  font-family:var(--fh);
  font-size:3.5rem;
  line-height:1;
}
.result-big .nota-label{
  font-size:.85rem;
  color:var(--text3);
  margin-bottom:.5rem;
}
.result-big .nota-grade{
  font-family:var(--fh);
  font-size:1.1rem;
  margin:.5rem 0;
}
.result-big .nota-sub{
  font-size:.8rem;
  color:var(--text3);
}
.result-retry{margin-top:1.25rem}

/* ── annotation overlay for aprendizaje ── */
.anno-wrap{position:relative;display:inline-block;width:100%}
.anno-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>

═══════════════════════════════════════════════════════ -->
<section id="sec-learn" class="mode-section">

    <div class="rhythm-grid" id="rg-learn"></div>
  </div>

  <div class="info-panel" id="learnInfo">
    <h3 id="learn-info-title">Ritmo Sinusal Normal</h3>
    <div class="info-rows" id="learn-info-rows"></div>
    <div class="significance-box" id="learn-sig"></div>
    <div class="mgmt-box" id="learn-mgmt"></div>
  </div>
</section>

<!-- ══════════════════════════════════════════════════════
     EVALUACIÓN
═══════════════════════════════════════════════════════ -->
<section id="sec-eval" class="mode-section">
  <div id="eval-active">
    <div class="eval-progress">
      <span class="eval-q-num" id="eval-qnum">1 / 16</span>
      <div class="prog-bar"><div class="prog-fill" id="eval-prog-fill" style="width:0%"></div></div>
      <span class="eval-q-num" id="eval-score-live">0 correctas</span>
    </div>

    <div class="ecg-wrap" style="height:200px;margin-bottom:1rem">
      <span class="ecg-label">¿Qué ritmo es este?</span>
      <canvas id="evalCanvas" height="200"></canvas>
    </div>

    <p class="eval-prompt">Identifica el ritmo mostrado:</p>
    <div class="eval-choices" id="eval-choices"></div>
    <div id="eval-fb" class="eval-fb" style="display:none"></div>
    <button class="btn eval-next-btn" id="eval-next-btn" style="display:none" onclick="evalNext()">
      Siguiente →
    </button>
  </div>

  <div id="eval-result" style="display:none">
    <div class="result-big">
      <div class="nota-num" id="res-nota"></div>
      <div class="nota-label">nota / 20</div>
      <div class="nota-grade" id="res-grade"></div>
      <div class="nota-sub" id="res-sub"></div>
    </div>
    <button class="btn result-retry" onclick="evalStart()">Repetir evaluación</button>
  </div>
</section>

</main>

const CAT_LABELS = {
  sinusal:'Sinusal', auricular:'Auricular', bloqueoav:'Bloqueo AV',
  conduccion:'Conducción', ventricular:'Ventricular', isquemia:'Isquemia'
};

const DISTRACTORS = {
  normal:['brady','tachy','av1'],
  brady:['normal','av3','mobitz2'],
  tachy:['afib','aflutter','vt'],
  afib:['aflutter','tachy','pvc'],
  aflutter:['afib','tachy','av1'],
  av1:['normal','wenckebach','lbbb'],
  wenckebach:['av1','mobitz2','normal'],
  mobitz2:['wenckebach','av3','av1'],
  av3:['mobitz2','av1','brady'],
  lbbb:['rbbb','stemi','av1'],
  rbbb:['lbbb','normal','av1'],
  pvc:['vt','normal','lbbb'],
  vt:['vfib','lbbb','pvc'],
  vfib:['vt','afib','pvc'],
  stemi:['nstemi','normal','lbbb'],
  nstemi:['stemi','normal','rbbb'],
};

/* ══════════════════════════════════════════════════════
   WAVEFORM ENGINE
═══════════════════════════════════════════════════════ */
const SR = 200;       // samples/sec
const PPS = 0.5;      // px per sample  (100 px/s ÷ 200 Hz)
const AMP = 80;       // px per mV

const G = (t, c, s, a) => a * Math.exp(-((t - c) ** 2) / (2 * s * s));

/* Returns voltage (mV) at phase t (0..1) within a beat */
function beatNormal(t, cfg = {}) {
  const {pr=0.16, qrsW=0.08, stShift=0, tInvert=false, noP=false, qrsAmp=1.0, prLong=false} = cfg;
  const RR = 1;
  const prStart = 0.05;
  const qrsCenter = prStart + (prLong ? 0.26 : pr) + qrsW / 2;
  const stEnd = qrsCenter + qrsW / 2 + 0.04;
  const tCenter = stEnd + 0.16;

  let v = 0;
  if (!noP) v += G(t, 0.12, 0.025, 0.15);          // P wave
  v += G(t, qrsCenter - 0.01, 0.007, -0.15);        // Q
  v += G(t, qrsCenter,        0.012, 1.2 * qrsAmp); // R
  v += G(t, qrsCenter + 0.01, 0.007, -0.15);        // S
  if (stShift !== 0) {                               // ST shift
    const stC = qrsCenter + qrsW / 2 + 0.05;
    v += G(t, stC, 0.04, stShift);
  }
  const tAmp = tInvert ? -0.25 : 0.25;
  v += G(t, tCenter, 0.035, tAmp);                  // T wave
  return v;
}

function beatLBBB(t) {
  const c = 0.3;
  let v = G(t, 0.12, 0.025, 0.12);        // P
  v += G(t, c - 0.015, 0.01, -0.1);       // q absent / small
  v += G(t, c,         0.018, 0.9);       // broad R notch 1
  v += G(t, c + 0.03, 0.018, 0.7);        // broad R notch 2
  v += G(t, c + 0.018,0.008, -0.25);      // notch dip
  v += G(t, c + 0.05, 0.04, -0.3);        // discordant T
  return v;
}

function beatRBBB(t) {
  const c = 0.28;
  let v = G(t, 0.12, 0.025, 0.12);       // P
  v += G(t, c,         0.01, 0.7);        // r (first R)
  v += G(t, c + 0.02, 0.008, -0.5);       // S
  v += G(t, c + 0.04, 0.01, 0.6);         // R' (second peak)
  v += G(t, c + 0.07, 0.035, 0.2);        // T
  return v;
}

function beatVentricular(t, wide = true) {
  const c = wide ? 0.32 : 0.28;
  const w = wide ? 0.045 : 0.025;
  let v = G(t, c, w, 1.4);
  v += G(t, c + w * 2, w * 1.5, -0.7);
  v += G(t, c + w * 4, 0.04, -0.3);
  return v;
}

/* Noise-based chaos for vfib */
let _rngState = 12345;
function seededRand() {
  _rngState = (_rngState * 1664525 + 1013904223) & 0xffffffff;
  return (_rngState >>> 0) / 0xffffffff;
}
function vfibVoltage(t) {
  const f1 = Math.sin(2 * Math.PI * 7.3 * t);
  const f2 = Math.sin(2 * Math.PI * 5.1 * t + 1.2);
  const f3 = Math.sin(2 * Math.PI * 9.7 * t + 2.4);
  const n = (seededRand() - 0.5) * 0.3;
  return 0.35 * f1 + 0.25 * f2 + 0.15 * f3 + n;
}

/* ──────────────────────────────────────────
   Engine: stateful rhythm generator
────────────────────────────────────────── */
const engine = {
  rhythmId: 'normal',
  hr: 72,
  t: 0,            // absolute time (seconds)
  nextBeatT: 0,    // time of next beat start
  beatT: 0,        // beat phase origin
  beatRR: 60/72,

  wenckP: 0,       // Wenckebach PR accumulator
  wenckCycle: 0,   // beats in current Wenckebach sequence
  wenckDrop: false,

  mobitzCount: 0,  // Mobitz II — beat index; every 3rd is blocked
  av3AurT: 0,      // AV3 — separate atrial timer
  pvcPhase: 0,     // PVC — beats since last PVC
  aflutterAurT: 0, // flutter separate atrial

  reset(rid, hr) {
    this.rhythmId = rid;
    this.hr = hr;
    this.t = 0;
    this.nextBeatT = 0;
    this.beatT = 0;
    this.beatRR = 60 / hr;
    this.wenckP = 0.18;
    this.wenckCycle = 0;
    this.wenckDrop = false;
    this.mobitzCount = 0;
    this.av3AurT = 0;
    this.pvcPhase = 0;
    this.aflutterAurT = 0;
    _rngState = 54321;
  },

  voltage(t) {
    const rid = this.rhythmId;

    if (rid === 'vfib') return vfibVoltage(t * 8);

    /* phase within current beat (0..1) */
    const rr = this.beatRR || 0.6;
    const phase = (t - this.beatT) / rr;

    if (rid === 'normal') return beatNormal(phase);
    if (rid === 'brady')  return beatNormal(phase);
    if (rid === 'tachy')  return beatNormal(phase, {pr:0.14});
    if (rid === 'av1')    return beatNormal(phase, {prLong:true});

    if (rid === 'afib') {
      const v = beatNormal(phase, {noP:true});
      const fibs = Math.sin(2*Math.PI*6.5*t)*0.05 + Math.sin(2*Math.PI*8.1*t)*0.03;
      return v + fibs;
    }
    if (rid === 'aflutter') {
      const aurP = ((t - this.aflutterAurT) % (60/300)) / (60/300);
      const sawV = aurP < 0.5 ? -0.18 * (1 - 2*aurP) : 0.18 * (1 - 2*(aurP-0.5));
      const qrsV = beatNormal(phase, {noP:true});
      return sawV + qrsV;
    }

    if (rid === 'wenckebach') {
      const prV = 0.12 + this.wenckP;
      const v = this.wenckDrop ? 0 : beatNormal(phase, {pr:Math.min(prV,0.36)});
      return v;
    }
    if (rid === 'mobitz2') {
      if (this.mobitzCount % 3 === 2) {
        return G(phase, 0.12, 0.025, 0.13);
      }
      return beatNormal(phase, {pr:0.22});
    }
    if (rid === 'av3') {
      const venRR = 60/38;
      const venPhase = (t - this.beatT) / venRR;
      const aurRR = 60/75;
      const aurPhase = ((t - this.av3AurT) % aurRR) / aurRR;
      const aurV = G(aurPhase, 0.12, 0.025, 0.15);
      const venV = beatNormal(Math.max(0, venPhase), {noP:true, qrsAmp:0.9});
      return aurV + venV;
    }

    if (rid === 'lbbb') return beatLBBB(phase);
    if (rid === 'rbbb') return beatRBBB(phase);

    if (rid === 'pvc') {
      if (this.pvcPhase === 1) return beatVentricular(phase);
      return beatNormal(phase);
    }
    if (rid === 'vt') return beatVentricular(phase, true);

    if (rid === 'stemi') return beatNormal(phase, {stShift:0.25, qrsAmp:1.1});
    if (rid === 'nstemi') return beatNormal(phase, {stShift:-0.18, tInvert:true});

    return beatNormal(phase);
  },

  /* Advance time and schedule next beat */
  advance(dt) {
    this.t += dt;
    const rid = this.rhythmId;

    if (this.t >= this.nextBeatT) {
      const rr = 60 / this.hr;

      if (rid === 'vfib') {
        this.beatT = this.nextBeatT;
        this.beatRR = rr;
        this.nextBeatT += rr;
        return;
      }

      this.beatT = this.nextBeatT;

      if (rid === 'wenckebach') {
        if (this.wenckDrop) {
          this.wenckDrop = false;
          this.wenckP = 0.02;
          this.wenckCycle = 0;
        }
        this.wenckCycle++;
        this.wenckP = 0.02 + this.wenckCycle * 0.06;
        if (this.wenckCycle >= 3) {
          this.wenckDrop = true;
          this.beatRR = rr * 0.5;
          this.nextBeatT = this.beatT + this.beatRR;
          return;
        }
        this.beatRR = rr;
        this.nextBeatT = this.beatT + rr;
        return;
      }

      if (rid === 'mobitz2') {
        this.mobitzCount++;
        if (this.mobitzCount % 3 === 2) {
          this.beatRR = rr * 0.4;
          this.nextBeatT = this.beatT + this.beatRR;
          return;
        }
        this.beatRR = rr;
        this.nextBeatT = this.beatT + rr;
        return;
      }

      if (rid === 'av3') {
        const venRR = 60 / 38;
        this.beatRR = venRR;
        this.nextBeatT = this.beatT + venRR;
        if (this.av3AurT === 0) this.av3AurT = this.beatT;
        return;
      }

      if (rid === 'pvc') {
        this.pvcPhase = (this.pvcPhase + 1) % 4;
        this.beatRR = rr;
        if (this.pvcPhase === 1) {
          this.beatRR = rr * 0.7;
          this.nextBeatT = this.beatT + this.beatRR;
          return;
        }
        if (this.pvcPhase === 2) {
          this.beatRR = rr * 1.3;
          this.nextBeatT = this.beatT + this.beatRR;
          return;
        }
        this.nextBeatT = this.beatT + rr;
        return;
      }

      if (rid === 'afib') {
        const jitter = (Math.random() - 0.5) * rr * 0.4;
        this.beatRR = Math.max(rr * 0.5, rr + jitter);
        this.nextBeatT = this.beatT + this.beatRR;
        return;
      }

      if (rid === 'aflutter') {
        const ratio = 4;
        if (this.aflutterAurT === 0) this.aflutterAurT = this.beatT;
        this.beatRR = (60 / 300) * ratio;
        this.nextBeatT = this.beatT + this.beatRR;
        return;
      }

      this.beatRR = rr;
      this.nextBeatT = this.beatT + rr;
    }
  }
};

/* ══════════════════════════════════════════════════════
   CANVAS RENDERER
═══════════════════════════════════════════════════════ */
class ECGRenderer {
  constructor(canvasId, h = 200) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.h = h;
    this.resize();
    this.bufLen = Math.round(this.canvas.width / PPS) + 10;
    this.buf = new Float32Array(this.bufLen).fill(0);
    this.writePos = 0;
    this.readPos = 0;
    this.lastTs = null;
    this.rafId = null;
    this.running = false;
    this.engineRef = null;
    this.SR = SR;
    this.sampleAcc = 0;
  }
  resize() {
    this.canvas.width = this.canvas.offsetWidth || 760;
    this.canvas.height = this.h;
    this.baseline = this.h * 0.55;
  }
  start(eng) {
    this.engineRef = eng;
    this.running = true;
    this.lastTs = null;
    this.buf.fill(0);
    this.writePos = 0;
    this.readPos = 0;
    this.sampleAcc = 0;
    this.rafId = requestAnimationFrame(ts => this.frame(ts));
  }
  stop() {
    this.running = false;
    if (this.rafId) cancelAnimationFrame(this.rafId);
  }
  frame(ts) {
    if (!this.running) return;
    if (this.lastTs === null) this.lastTs = ts;
    const dt = Math.min((ts - this.lastTs) / 1000, 0.05);
    this.lastTs = ts;

    /* generate samples */
    const samplesNeeded = dt * this.SR;
    this.sampleAcc += samplesNeeded;
    const nSamples = Math.floor(this.sampleAcc);
    this.sampleAcc -= nSamples;
    const dt1 = 1 / this.SR;
    for (let i = 0; i < nSamples; i++) {
      this.engineRef.advance(dt1);
      const v = this.engineRef.voltage(this.engineRef.t);
      const idx = this.writePos % this.bufLen;
      this.buf[idx] = v;
      this.writePos++;
    }

    this.draw();
    this.rafId = requestAnimationFrame(ts2 => this.frame(ts2));
  }
  draw() {
    const ctx = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    ctx.clearRect(0, 0, W, H);

    /* grid */
    ctx.strokeStyle = '#1a3a5c';
    ctx.lineWidth = 0.5;
    const bigGrid = 100 * 0.2; // 0.2 s = 20px at 100px/s
    const smallGrid = bigGrid / 5;
    for (let x = 0; x < W; x += smallGrid) {
      ctx.globalAlpha = x % bigGrid < 0.5 ? 0.6 : 0.25;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += smallGrid) {
      ctx.globalAlpha = y % bigGrid < 0.5 ? 0.6 : 0.25;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    /* waveform — compute how many samples fit on screen */
    const samplesOnScreen = Math.ceil(W / PPS);
    const total = this.writePos;
    if (total < 2) return;

    /* current position is right edge; scroll left */
    const rhythm = this.engineRef;
    const col = rhythm.rhythmId;
    const r = RHYTHMS.find(r => r.id === col);
    ctx.strokeStyle = r ? r.color : '#4a9eff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = r ? r.color : '#4a9eff';

    ctx.beginPath();
    let started = false;
    for (let px = 0; px < W; px++) {
      const sIdx = Math.floor((total - 1) - (W - 1 - px) / PPS);
      if (sIdx < 0) continue;
      const v = this.buf[((sIdx % this.bufLen) + this.bufLen) % this.bufLen];
      const x = px;
      const y = this.baseline - v * AMP;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

/* ══════════════════════════════════════════════════════
   THREE RENDERERS (one per canvas)
═══════════════════════════════════════════════════════ */
let simRenderer, learnRenderer, evalRenderer;
let activeMode = 'sim';

function initRenderers() {
  simRenderer   = new ECGRenderer('simCanvas',   200);
  learnRenderer = new ECGRenderer('learnCanvas', 200);
  evalRenderer  = new ECGRenderer('evalCanvas',  200);
}

/* ══════════════════════════════════════════════════════
   MODE CONTROLLER
═══════════════════════════════════════════════════════ */
function setMode(m, btn) {
  ['sim','learn','eval'].forEach(id => {
    document.getElementById('sec-'+id).classList.toggle('active', id===m);
  });
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  simRenderer.stop();
  learnRenderer.stop();
  evalRenderer.stop();

  activeMode = m;

  if (m === 'sim') {
    const r = RHYTHMS.find(r => r.id === simRhythmId) || RHYTHMS[0];
    engine.reset(r.id, simHR);
    simRenderer.start(engine);
  } else if (m === 'learn') {
    const r = RHYTHMS.find(r => r.id === learnRhythmId) || RHYTHMS[0];
    engine.reset(r.id, r.hrDefault);
    learnRenderer.start(engine);
    renderLearnInfo(r);
  } else if (m === 'eval') {
    if (!evalStarted) evalStart();
    const r = evalQueue[evalIdx];
    engine.reset(r.id, r.hrDefault);
    evalRenderer.start(engine);
  }
}

/* ══════════════════════════════════════════════════════
   SIMULADOR
═══════════════════════════════════════════════════════ */
let simRhythmId = 'normal';
let simHR = 72;

function buildRhythmGrid(containerId, filter, onClick) {
  const el = document.getElementById(containerId);
  if (!el) return;
  RHYTHMS.filter(r => r.cat === filter).forEach(r => {
    const b = document.createElement('button');
    b.className = 'r-btn';
    b.textContent = r.name;
    b.dataset.rid = r.id;
    b.onclick = () => onClick(r, b, containerId);
    el.appendChild(b);
  });
}

function selectSimRhythm(r, btn, gridId) {
  document.querySelectorAll('#sec-sim .r-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  simRhythmId = r.id;
  simHR = r.hrDefault;
  document.getElementById('hrSlider').value = simHR;
  document.getElementById('hrDisplay').textContent = simHR + ' bpm';
  document.getElementById('sim-hr-badge').textContent = simHR + ' bpm';
  document.getElementById('sim-rhythm-label').textContent = r.name;
  engine.reset(r.id, simHR);
}

function onHrChange(val) {
  simHR = +val;
  document.getElementById('hrDisplay').textContent = val + ' bpm';
  document.getElementById('sim-hr-badge').textContent = val + ' bpm';
  engine.hr = simHR;
  engine.beatRR = 60 / simHR;
}

/* ══════════════════════════════════════════════════════
   APRENDIZAJE
═══════════════════════════════════════════════════════ */
let learnRhythmId = 'normal';

function buildLearnGrid() {
  const el = document.getElementById('rg-learn');
  RHYTHMS.forEach(r => {
    const b = document.createElement('button');
    b.className = 'r-btn';
    b.textContent = r.name;
    b.dataset.rid = r.id;
    b.onclick = () => selectLearnRhythm(r, b);
    el.appendChild(b);
  });
  el.firstChild && el.firstChild.classList.add('active');
}

function selectLearnRhythm(r, btn) {
  document.querySelectorAll('#rg-learn .r-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  learnRhythmId = r.id;
  document.getElementById('learn-rhythm-label').textContent = r.name;
  engine.reset(r.id, r.hrDefault);
  renderLearnInfo(r);
}

function renderLearnInfo(r) {
  document.getElementById('learn-info-title').textContent = r.name;
  const rows = [
    ['Frecuencia', r.info.rate],
    ['Regularidad', r.info.reg],
    ['Onda P', r.info.p],
    ['Intervalo PR', r.info.pr],
    ['Complejo QRS', r.info.qrs],
  ];
  document.getElementById('learn-info-rows').innerHTML = rows.map(([k,v]) =>
    `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`
  ).join('');
  document.getElementById('learn-sig').innerHTML = `<strong>Significado:</strong> ${r.info.sig}`;
  document.getElementById('learn-mgmt').innerHTML = `<strong>Manejo:</strong> ${r.info.mgmt}`;
}

/* ══════════════════════════════════════════════════════
   EVALUACIÓN
═══════════════════════════════════════════════════════ */
let evalQueue = [];
let evalIdx = 0;
let evalCorrect = 0;
let evalAnswered = false;
let evalStarted = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function evalStart() {
  evalQueue = shuffle(RHYTHMS);
  evalIdx = 0;
  evalCorrect = 0;
  evalAnswered = false;
  evalStarted = true;

  document.getElementById('eval-active').style.display = '';
  document.getElementById('eval-result').style.display = 'none';
  document.getElementById('eval-fb').style.display = 'none';
  document.getElementById('eval-next-btn').style.display = 'none';

  renderEvalQuestion();
  const r = evalQueue[0];
  engine.reset(r.id, r.hrDefault);
  evalRenderer.stop();
  evalRenderer.start(engine);
}

function renderEvalQuestion() {
  const total = evalQueue.length;
  const r = evalQueue[evalIdx];

  document.getElementById('eval-qnum').textContent = `${evalIdx + 1} / ${total}`;
  document.getElementById('eval-prog-fill').style.width = `${(evalIdx / total) * 100}%`;
  document.getElementById('eval-score-live').textContent = `${evalCorrect} correctas`;

  const distractorIds = DISTRACTORS[r.id] || [];
  const choices = shuffle([r, ...distractorIds.map(id => RHYTHMS.find(x => x.id === id)).filter(Boolean)]);

  document.getElementById('eval-choices').innerHTML = choices.map(c =>
    `<button class="eval-choice" data-id="${c.id}" onclick="evalAnswer('${c.id}')">${c.name}</button>`
  ).join('');
  document.getElementById('eval-fb').style.display = 'none';
  document.getElementById('eval-next-btn').style.display = 'none';
  evalAnswered = false;
}

function evalAnswer(choiceId) {
  if (evalAnswered) return;
  evalAnswered = true;

  const r = evalQueue[evalIdx];
  const correct = choiceId === r.id;
  if (correct) evalCorrect++;

  document.querySelectorAll('.eval-choice').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === r.id) b.classList.add('correct');
    else if (b.dataset.id === choiceId && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('eval-fb');
  fb.style.display = '';
  fb.className = 'eval-fb ' + (correct ? 'ok' : 'err');
  fb.textContent = correct
    ? `✓ Correcto. ${r.info.sig}`
    : `✗ Es ${r.name}. ${r.info.sig}`;

  const nextBtn = document.getElementById('eval-next-btn');
  nextBtn.style.display = '';
  nextBtn.textContent = evalIdx < evalQueue.length - 1 ? 'Siguiente →' : 'Ver resultado';
}

function evalNext() {
  evalIdx++;
  if (evalIdx >= evalQueue.length) {
    showEvalResult();
    return;
  }
  const r = evalQueue[evalIdx];
  engine.reset(r.id, r.hrDefault);
  evalRenderer.stop();
  evalRenderer.start(engine);
  renderEvalQuestion();
  document.getElementById('eval-score-live').textContent = `${evalCorrect} correctas`;
}

function showEvalResult() {
  evalRenderer.stop();
  document.getElementById('eval-active').style.display = 'none';
  document.getElementById('eval-result').style.display = '';

  const total = evalQueue.length;
  const nota = +(evalCorrect / total * 20).toFixed(1);
  const nc = nota >= 17 ? 'var(--green)' : nota >= 14 ? 'var(--blue)' : nota >= 11 ? 'var(--amber)' : 'var(--red)';
  const gradeLabel = nota >= 17 ? 'Excelente' : nota >= 14 ? 'Bueno' : nota >= 11 ? 'Aceptable' : 'Insuficiente';

  document.getElementById('res-nota').style.color = nc;
  document.getElementById('res-nota').textContent = nota;
  document.getElementById('res-grade').style.color = nc;
  document.getElementById('res-grade').textContent = gradeLabel;
  document.getElementById('res-sub').textContent = `${evalCorrect} de ${total} ritmos correctos`;
}

/* ══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  initRenderers();

  /* build sim grids */
  Object.entries(CAT_LABELS).forEach(([cat, label]) => {
    buildRhythmGrid('rg-' + cat.replace('bloqueoav','bloqueoav'), cat, selectSimRhythm);
  });

  /* mark first sim button active */
  const firstBtn = document.querySelector('#sec-sim .r-btn');
  if (firstBtn) firstBtn.classList.add('active');

  /* build learn grid */
  buildLearnGrid();

  /* start sim engine */
  engine.reset('normal', 72);
  simRenderer.start(engine);
  renderLearnInfo(RHYTHMS[0]);
});

window.addEventListener('resize', () => {
  [simRenderer, learnRenderer, evalRenderer].forEach(r => {
    if (r) { r.resize(); r.bufLen = Math.round(r.canvas.width / PPS) + 10; r.buf = new Float32Array(r.bufLen).fill(0); }
  });
});
</script>
